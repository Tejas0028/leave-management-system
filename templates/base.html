{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Leave Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #121212;
            color: #ffffff;
        }

        .navbar {
            background-color: #1E1E1E !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .navbar-brand {
            color: #7ae852 !important;
            font-weight: bold;
        }

        .nav-btn {
            margin-left: 10px;
            transition: 0.3s;
        }

        .btn-primary {
            background-color: #FF5722;
            border: none;
        }

        .btn-primary:hover {
            background-color: #ff784e;
        }

        .btn-success {
            background-color: #7ae852;
            border: none;
            color: #000;
        }

        .btn-success:hover {
            background-color: #9cff7a;
        }

        .btn-danger {
            background-color: #d849ff;
            border: none;
        }

        .container-box {
            background-color: #1F1F1F;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        input, textarea, select {
            background-color: #2a2a2a !important;
            border: 1px solid #444 !important;
            color: #fff !important;
        }

        input::placeholder {
            color: #bbb;
        }

        .alert {
            border-radius: 8px;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg px-4">

    <a class="navbar-brand" href="{% url 'home' %}">Leave System</a>

    <div class="ms-auto">

        {% if user.is_authenticated %}

            <span class="me-3">
                {{ user.email }}
            </span>

            <a href="{% url 'dashboard' %}" class="btn btn-sm btn-success nav-btn">
                Dashboard
            </a>
 
            <a href="{% url 'logout' %}" class="btn btn-sm btn-danger nav-btn">
                Logout
            </a>

        {% else %}

            <a href="{% url 'login' %}" class="btn btn-sm btn-success nav-btn">
                Login 
            </a>

            <a href="{% url 'register' %}" class="btn btn-sm btn-primary nav-btn">
                Register
            </a>

        {% endif %}

    </div>

</nav>

<!-- MAIN CONTENT -->
<div class="container mt-5">

    <div class="container-box">

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}

    </div>

</div>

</body>
</html>
